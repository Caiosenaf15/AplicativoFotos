<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="src/indexJS.js" defer type="module"></script>
<link rel="stylesheet" href="src/indexStyle.css">
<title>Maria 15 anos</title>

</head>
<body>
<header>
  <div class="header-content">
    <h1 class="party-title" id="partyTitle">
      <span class="title-name">Maria</span>
      <span class="title-number">15 anos</span>
      <span class="title-emoji">🎂</span>
    </h1>
    <div class="party-subtitle">Registre e compartilhe os momentos mais especiais</div>
    <div class="live-badge">
      <span class="live-dot"></span>
      <span id="onlineCount">0</span> fotos
    </div>
  </div>
</header>

<div class="upload-section">
  <div class="upload-card" id="dropZone">
    <input id="fileInput" type="file" accept="image/*,video/*" capture="environment" hidden>
    <button id="cameraBtn" type="button">
      <div class="upload-icon">📷</div>
      <div class="upload-title">Adicionar foto ou vídeo</div>
      <div class="upload-hint">Toque para abrir a câmera ou galeria</div>
    </button>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <button class="preview-clear" id="clearPreview">✕</button>
    <img id="previewImg" style="display:none">
    <video id="previewVid" style="display:none" muted playsinline></video>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">Enviando...</div>
  </div>

  <div class="name-row">
    <input class="name-input" id="nameInput" type="text" placeholder="Seu nome (opcional)" maxlength="30">
    <button class="send-btn" id="sendBtn" disabled>Enviar</button>
  </div>
</div>

<div class="gallery-section">
  <div class="gallery-header">
    <span class="gallery-title">Álbum da festa</span>
    <span class="photo-count" id="photoCountLabel"></span>
  </div>
  <div class="grid" id="gallery">
    <div class="empty-state" id="emptyState" style="grid-column: 1/-1;">
      <div class="empty-icon">🎉</div>
      <p>Seja o primeiro a postar uma foto!</p>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <div class="lightbox-inner" id="lightboxInner"></div>
  <div class="lightbox-info" id="lightboxInfo"></div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toastContainer"></div>

<footer style="
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0 0 32px;
">
  <a href="./admin.html" style="
    font-size: 11px;
    color: rgba(0, 0, 0, 0.12);
    text-decoration: none;
    letter-spacing: 0.05em;
  ">Admin</a>
</footer>
</body>
</html>
