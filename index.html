<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📸 Nossa Festa</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07071A;
    --surface: #0F0F2E;
    --card: #161630;
    --gold: #F7C948;
    --pink: #FF6B9D;
    --purple: #7B61FF;
    --white: #FFFFFF;
    --muted: rgba(255,255,255,0.45);
    --border: rgba(255,255,255,0.08);
    --radius: 16px;
    --font: 'Inter', system-ui, sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap');

  html, body {
    min-height: 100dvh;
    background: var(--bg);
    color: var(--white);
    font-family: var(--font);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 50% 50%, rgba(247,201,72,0.15) 0%, transparent 60%),
      radial-gradient(600px 600px at 80% 20%, rgba(123,97,255,0.06) 0%, transparent 70%),
      radial-gradient(500px 500px at 20% 70%, rgba(255,107,157,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 48px 20px 32px;
  }

  #cameraBtn {
    background-color: transparent;
    border: none;
    cursor: pointer;
    width: 100%;
  }

  .party-title {
    font-family: 'Space Grotesk', var(--font);
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold) 0%, var(--pink) 50%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .party-subtitle {
    color: var(--muted);
    font-size: 15px;
    letter-spacing: 0.04em;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(247,201,72,0.12);
    border: 1px solid rgba(247,201,72,0.25);
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 999px;
    margin-top: 16px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .upload-section {
    position: relative;
    z-index: 10;
    max-width: 520px;
    margin: 0 auto 40px;
    padding: 0 20px;
  }

  .upload-card {
    background: var(--card);
    border: 1.5px dashed rgba(123,97,255,0.35);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .upload-card:hover {
    border-color: var(--purple);
    background: rgba(123,97,255,0.06);
  }

  .upload-icon {
    width: 52px;
    height: 52px;
    margin: 0 auto 14px;
    background: rgba(123,97,255,0.15);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .upload-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 4px;
  }

  .upload-hint {
    font-size: 13px;
    color: var(--muted);
  }

  .name-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .name-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--white);
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    font-family: var(--font);
    transition: border-color 0.2s;
  }

  .name-input::placeholder { color: var(--muted); }
  .name-input:focus { border-color: rgba(123,97,255,0.5); }

  .send-btn {
    background: var(--purple);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    padding: 11px 20px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    font-family: var(--font);
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  .preview-wrap {
    margin-top: 14px;
    display: none;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    max-height: 220px;
  }

  .preview-wrap.show { display: block; }

  .preview-wrap img, .preview-wrap video {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
    display: block;
  }

  .preview-clear {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .progress-wrap {
    margin-top: 12px;
    display: none;
  }

  .progress-wrap.show { display: block; }

  .progress-bar-bg {
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    height: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    border-radius: 999px;
    width: 0%;
    transition: width 0.3s;
  }

  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    text-align: center;
  }

  .gallery-section {
    position: relative;
    z-index: 10;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  .gallery-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 0 4px;
  }

  .gallery-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .photo-count {
    font-size: 13px;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  @media (min-width: 600px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  }

  .grid-item {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 1;
    cursor: pointer;
    background: var(--card);
    animation: fade-in 0.4s ease forwards;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: scale(0.94); }
    to { opacity: 1; transform: scale(1); }
  }

  .grid-item img, .grid-item video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .grid-item:hover img, .grid-item:hover video {
    transform: scale(1.04);
  }

  .grid-item-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    align-items: flex-end;
    padding: 10px;
  }

  .grid-item:hover .grid-item-overlay { opacity: 1; }

  .grid-item-name {
    font-size: 12px;
    font-weight: 600;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .video-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.55);
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 11px;
    color: white;
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .lightbox.open { display: flex; }

  .lightbox-inner {
    position: relative;
    max-width: min(90vw, 900px);
    max-height: 90dvh;
    border-radius: 16px;
    overflow: hidden;
  }

  .lightbox-inner img, .lightbox-inner video {
    max-width: 100%;
    max-height: 85dvh;
    object-fit: contain;
    display: block;
    border-radius: 12px;
  }

  .lightbox-close {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .lightbox-close:hover { background: rgba(255,255,255,0.2); }

  .lightbox-info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 13px;
    color: white;
    white-space: nowrap;
  }

  .toast-container {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .toast {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--white);
    font-size: 14px;
    padding: 12px 20px;
    border-radius: 12px;
    animation: toast-in 0.3s ease;
    white-space: nowrap;
  }

  .toast.success { border-color: rgba(123,97,255,0.4); color: var(--gold); }
  .toast.error { border-color: rgba(255,107,157,0.4); color: var(--pink); }

  @keyframes toast-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="party-title" id="partyTitle">Maria 15 anos ✨</div>
  <div class="party-subtitle">Registre e compartilhe os momentos</div>
  <div class="live-badge">
    <span class="live-dot"></span>
    <span id="onlineCount">0</span> fotos
  </div>
</header>

<div class="upload-section">
  <div class="upload-card" id="dropZone">
    <input id="fileInput" type="file" accept="image/*,video/*" hidden>
    <button id="cameraBtn" type="button">
      <div class="upload-icon">📷</div>
      <div class="upload-title">Adicionar foto ou vídeo</div>
      <div class="upload-hint">Toque para abrir a câmera ou galeria</div>
    </button>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <button class="preview-clear" id="clearPreview">✕</button>
    <img id="previewImg" style="display:none">
    <video id="previewVid" style="display:none" muted playsinline></video>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">Enviando...</div>
  </div>

  <div class="name-row">
    <input class="name-input" id="nameInput" type="text" placeholder="Seu nome (opcional)" maxlength="30">
    <button class="send-btn" id="sendBtn" disabled>Enviar</button>
  </div>
</div>

<div class="gallery-section">
  <div class="gallery-header">
    <span class="gallery-title">Álbum da festa</span>
    <span class="photo-count" id="photoCountLabel"></span>
  </div>
  <div class="grid" id="gallery">
    <div class="empty-state" id="emptyState" style="grid-column: 1/-1;">
      <div class="empty-icon">🎉</div>
      <p>Seja o primeiro a postar uma foto!</p>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <div class="lightbox-inner" id="lightboxInner"></div>
  <div class="lightbox-info" id="lightboxInfo"></div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── CONFIG SUPABASE ──
  const SUPABASE_URL = "https://qttansxigwchcojwisau.supabase.co";
  const SUPABASE_KEY = "sb_publishable_CDY-I7zP9OcKMZ-ZagSZKw_HxBli5Ki";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── ELEMENTOS ──
  const fileInput      = document.getElementById("fileInput");
  const cameraBtn      = document.getElementById("cameraBtn");
  const previewWrap    = document.getElementById("previewWrap");
  const previewImg     = document.getElementById("previewImg");
  const previewVid     = document.getElementById("previewVid");
  const clearPreview   = document.getElementById("clearPreview");
  const sendBtn        = document.getElementById("sendBtn");
  const nameInput      = document.getElementById("nameInput");
  const gallery        = document.getElementById("gallery");
  const onlineCount    = document.getElementById("onlineCount");
  const photoCountLabel= document.getElementById("photoCountLabel");
  const progressWrap   = document.getElementById("progressWrap");
  const progressFill   = document.getElementById("progressFill");
  const progressLabel  = document.getElementById("progressLabel");
  const lightbox       = document.getElementById("lightbox");
  const lightboxInner  = document.getElementById("lightboxInner");
  const lightboxInfo   = document.getElementById("lightboxInfo");
  const lightboxClose  = document.getElementById("lightboxClose");
  const toastContainer = document.getElementById("toastContainer");

  let arquivoSelecionado = null;

  // ── TOAST ──
  function showToast(msg, type = "success") {
    const t = document.createElement("div");
    t.className = `toast ${type}`;
    t.textContent = msg;
    toastContainer.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  // ── ABRIR SELETOR DE ARQUIVO ──
  cameraBtn.addEventListener("click", () => fileInput.click());

  // ── PREVIEW AO SELECIONAR ARQUIVO ──
  fileInput.addEventListener("change", () => {
    if (!fileInput.files.length) return;

    arquivoSelecionado = fileInput.files[0];

    const url = URL.createObjectURL(arquivoSelecionado);

    previewImg.style.display = "none";
    previewVid.style.display = "none";

    if (arquivoSelecionado.type.startsWith("image")) {
      previewImg.src = url;
      previewImg.style.display = "block";
    } else {
      previewVid.src = url;
      previewVid.style.display = "block";
    }

    previewWrap.classList.add("show");
    sendBtn.disabled = false;
  });

  // ── LIMPAR PREVIEW ──
  clearPreview.addEventListener("click", () => {
    arquivoSelecionado = null;
    fileInput.value = "";
    previewImg.src = "";
    previewVid.src = "";
    previewWrap.classList.remove("show");
    sendBtn.disabled = true;
  });

  // ── ENVIAR ──
  sendBtn.addEventListener("click", async () => {
    if (!arquivoSelecionado) return;

    const nome = nameInput.value.trim();
    const ext  = arquivoSelecionado.name.split(".").pop();
    const nomeArquivo = Date.now() + (nome ? "_" + nome.replace(/\s+/g, "_") : "") + "." + ext;

    sendBtn.disabled = true;
    progressWrap.classList.add("show");
    progressFill.style.width = "30%";
    progressLabel.textContent = "Enviando...";

    const { error } = await sb.storage
      .from("fotos")
      .upload(nomeArquivo, arquivoSelecionado);

    if (error) {
      showToast("Erro: " + error.message, "error");
      sendBtn.disabled = false;
      progressWrap.classList.remove("show");
      return;
    }

    progressFill.style.width = "100%";
    progressLabel.textContent = "Concluído!";

    const { data: urlData } = sb.storage.from("fotos").getPublicUrl(nomeArquivo);

    adicionarItemNaGaleria(urlData.publicUrl, arquivoSelecionado.type, nome);
    atualizarContador(1);
    showToast("Foto enviada! 🎉");

    // reset
    setTimeout(() => progressWrap.classList.remove("show"), 1000);
    arquivoSelecionado = null;
    fileInput.value = "";
    previewImg.src = "";
    previewVid.src = "";
    previewWrap.classList.remove("show");
    sendBtn.disabled = true;
  });

  // ── ADICIONAR ITEM NA GALERIA (só renderiza, não busca do servidor) ──
  function adicionarItemNaGaleria(url, tipo, nome = "") {
    document.getElementById("emptyState")?.remove();

    const item = document.createElement("div");
    item.className = "grid-item";

    const isVideo = tipo.startsWith("video");

    item.innerHTML = isVideo
      ? `<video src="${url}" muted playsinline></video>
         <span class="video-badge">▶ Vídeo</span>`
      : `<img src="${url}" loading="lazy">`;

    const overlay = document.createElement("div");
    overlay.className = "grid-item-overlay";
    if (nome) overlay.innerHTML = `<span class="grid-item-name">📸 ${nome}</span>`;
    item.appendChild(overlay);

    item.addEventListener("click", () => abrirLightbox(url, isVideo, nome));

    gallery.prepend(item);
  }

  // ── ATUALIZAR CONTADOR ──
  let totalFotos = 0;
  function atualizarContador(delta = 0) {
    totalFotos += delta;
    onlineCount.textContent = totalFotos;
    photoCountLabel.textContent = totalFotos > 0 ? `${totalFotos} ${totalFotos === 1 ? "item" : "itens"}` : "";
  }

  // ── CARREGAR GALERIA DO SUPABASE ──
  async function carregarGaleria() {
    const { data, error } = await sb.storage
      .from("fotos")
      .list("", { sortBy: { column: "created_at", order: "desc" } });

    if (error) {
      showToast("Erro ao carregar galeria", "error");
      console.error(error);
      return;
    }

    // Filtra apenas arquivos (ignora pastas/placeholders sem extensão)
    const arquivos = (data || []).filter(f => f.name.includes(".") && f.name !== ".emptyFolderPlaceholder");

    if (arquivos.length === 0) return;

    document.getElementById("emptyState")?.remove();
    gallery.innerHTML = "";
    totalFotos = 0;

    for (const arquivo of arquivos) {
      const { data: urlData } = sb.storage.from("fotos").getPublicUrl(arquivo.name);
      const ext = arquivo.name.split(".").pop().toLowerCase();
      const tipo = ["mp4", "mov", "webm"].includes(ext) ? "video/mp4" : "image/jpeg";

      // Tenta extrair nome do arquivo (formato: timestamp_nome.ext)
      const partes = arquivo.name.split("_");
      const nomeExtraido = partes.length > 1
        ? partes.slice(1).join("_").replace("." + ext, "").replace(/_/g, " ")
        : "";

      adicionarItemNaGaleria(urlData.publicUrl, tipo, nomeExtraido);
      totalFotos++;
    }

    onlineCount.textContent = totalFotos;
    photoCountLabel.textContent = `${totalFotos} ${totalFotos === 1 ? "item" : "itens"}`;
  }

  // ── LIGHTBOX ──
  function abrirLightbox(url, isVideo, nome) {
    lightboxInner.innerHTML = isVideo
      ? `<video src="${url}" controls autoplay playsinline style="max-width:100%;max-height:85dvh;border-radius:12px;display:block;"></video>`
      : `<img src="${url}" style="max-width:100%;max-height:85dvh;object-fit:contain;display:block;border-radius:12px;">`;

    lightboxInfo.textContent = nome ? "📸 " + nome : "";
    lightbox.classList.add("open");
  }

  lightboxClose.addEventListener("click", () => {
    lightbox.classList.remove("open");
    lightboxInner.innerHTML = "";
  });

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      lightbox.classList.remove("open");
      lightboxInner.innerHTML = "";
    }
  });

  // ── INIT ──
  carregarGaleria();
</script>
<footer style="
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0 0 32px;
">
  <a href="./admin.html" style="
    font-size: 11px;
    color: rgba(255,255,255,0.12);
    text-decoration: none;
    letter-spacing: 0.05em;
  ">Admin</a>
</footer>
</body>
</html>
